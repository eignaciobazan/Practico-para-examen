<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Targetes d'animals</title>
    <link rel="stylesheet" href="RA.css">
</head>
<body>

    <!-- FONDO DE LA PÁGINA -->
    <div class="background"></div>

    <!-- CONTENEDOR DE TARJETAS -->
    <div class="cards-container">

        <!-- ===== TARJETA 1 ===== -->
        <input type="checkbox" id="card-lion" class="card-checkbox">
        <label for="card-lion" class="card">

            <div class="card-inner">

                <!-- CARA FRONTAL -->
                <div class="card-front">
                    <img src="https://images.unsplash.com/photo-1614027164847-1b28cfe1df60" alt="León">
                    <div class="card-name">León</div>
                </div>

                <!-- CARA POSTERIOR -->
                <div class="card-back">
                    <p><strong>Alimentación:</strong> Carnívoro</p>
                    <p><strong>Actividad:</strong> Diurno</p>
                    <p><strong>Vida:</strong> 10–14 años</p>
                </div>

            </div>
        </label>

        <!-- ===== TARJETA 2 ===== -->
        <input type="checkbox" id="card-elephant" class="card-checkbox">
        <label for="card-elephant" class="card">

            <div class="card-inner">

                <div class="card-front">
                    <img src="https://images.unsplash.com/photo-1508675801627-066ac4346a30" alt="Elefante">
                    <div class="card-name">Elefante</div>
                </div>

                <div class="card-back">
                    <p><strong>Alimentación:</strong> Herbívoro</p>
                    <p><strong>Actividad:</strong> Diurno</p>
                    <p><strong>Vida:</strong> 60–70 años</p>
                </div>

            </div>
        </label>

        <!-- ===== TARJETA 3 ===== -->
        <input type="checkbox" id="card-owl" class="card-checkbox">
        <label for="card-owl" class="card">

            <div class="card-inner">

                <div class="card-front">
                    <img src="https://images.unsplash.com/photo-1501706362039-c6b2a4b7b8b3" alt="Búho">
                    <div class="card-name">Búho</div>
                </div>

                <div class="card-back">
                    <p><strong>Alimentación:</strong> Carnívoro</p>
                    <p><strong>Actividad:</strong> Nocturno</p>
                    <p><strong>Vida:</strong> 15–20 años</p>
                </div>

            </div>
        </label>

    </div>

</body>
</html>
