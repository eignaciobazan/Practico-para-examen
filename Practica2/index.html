<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Examen CSS - Circuito Triángulo</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <input type="radio" name="estado-carrera" id="carrera-on" checked>
  <input type="radio" name="estado-carrera" id="carrera-reset">

  <input type="checkbox" id="play-pausa">

  <div class="contenedor-principal">
    
    <div class="panel-control">
      <label for="play-pausa" class="btn btn-play">▶️ Arrancar / Pausa</label>
      <label for="carrera-reset" class="btn btn-reset">🔄 Reiniciar Meta</label>
      <label for="carrera-on" class="btn btn-on">🔌 Reactivar Circuito</label>
    </div>

    <div class="circuito">
      <div class="auto"></div>
    </div>

  </div>

</body>
</html>
